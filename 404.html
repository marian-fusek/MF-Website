<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4oh4 — MF</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 404-specific overrides */
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

    #mf-404 {
      position: fixed;
      inset: 0;
      background: #050505;
      color: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Geist", sans-serif;
      cursor: none;
      overflow: hidden;
    }

    /* Custom cursor */
    #cursor-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #f4f4f4;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .15s, height .15s;
    }

    #cursor-ring {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(244,244,244,.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform .12s var(--ease), width .2s, height .2s, opacity .2s;
    }

    /* ASCII ambient */
    .f-ascii {
      position: fixed;
      font-family: "Geist Mono", monospace;
      font-size: 10px;
      letter-spacing: .08em;
      color: rgba(255,255,255,.14);
      opacity: 0;
      transition: opacity .35s ease;
      pointer-events: none;
      z-index: 2;
    }
    .f-ascii.show { opacity: 1; }

    /* 4oh4 text */
    #text-404 {
      position: relative;
      z-index: 5;
      font-size: 60vw;
      font-weight: 650;
      line-height: .85;
      letter-spacing: -.055em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #text-404 .nc {
      display: inline;
      transition: filter .3s ease, color .06s linear, text-shadow .2s ease;
    }

    /* RECALIBRATE button */
    #btn-recalibrate {
      position: relative;
      z-index: 5;
      margin-top: 6vh;
      font-family: "Geist Mono", monospace;
      font-size: clamp(9px, 0.9vw, 14px);
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(244,244,244,.55);
      text-decoration: none;
      border: 1px solid rgba(244,244,244,.2);
      padding: .8em 2.2em;
      transition: color .4s ease, border-color .4s ease;
      cursor: none;
    }

    #btn-recalibrate:hover {
      color: #f4f4f4;
      border-color: rgba(244,244,244,.7);
    }

    /* Grid lines (same as main site) */
    .f-grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: .5;
      background:
        linear-gradient(to right, transparent calc(10% - .5px), rgba(244,244,244,.06) calc(10% - .5px), rgba(244,244,244,.06) calc(10% + .5px), transparent calc(10% + .5px)),
        linear-gradient(to right, transparent calc(20% - .5px), rgba(244,244,244,.06) calc(20% - .5px), rgba(244,244,244,.06) calc(20% + .5px), transparent calc(20% + .5px)),
        linear-gradient(to right, transparent calc(30% - .5px), rgba(244,244,244,.06) calc(30% - .5px), rgba(244,244,244,.06) calc(30% + .5px), transparent calc(30% + .5px)),
        linear-gradient(to right, transparent calc(40% - .5px), rgba(244,244,244,.06) calc(40% - .5px), rgba(244,244,244,.06) calc(40% + .5px), transparent calc(40% + .5px)),
        linear-gradient(to right, transparent calc(50% - .5px), rgba(244,244,244,.06) calc(50% - .5px), rgba(244,244,244,.06) calc(50% + .5px), transparent calc(50% + .5px)),
        linear-gradient(to right, transparent calc(60% - .5px), rgba(244,244,244,.06) calc(60% - .5px), rgba(244,244,244,.06) calc(60% + .5px), transparent calc(60% + .5px)),
        linear-gradient(to right, transparent calc(70% - .5px), rgba(244,244,244,.06) calc(70% - .5px), rgba(244,244,244,.06) calc(70% + .5px), transparent calc(70% + .5px)),
        linear-gradient(to right, transparent calc(80% - .5px), rgba(244,244,244,.06) calc(80% - .5px), rgba(244,244,244,.06) calc(80% + .5px), transparent calc(80% + .5px)),
        linear-gradient(to right, transparent calc(90% - .5px), rgba(244,244,244,.06) calc(90% - .5px), rgba(244,244,244,.06) calc(90% + .5px), transparent calc(90% + .5px));
    }
  </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div id="mf-404">

  <div class="f-grid"></div>

  <!-- ASCII ambient texts -->
  <div class="f-ascii" style="left:8%;top:14%">LOST_IN_SPACE</div>
  <div class="f-ascii" style="left:72%;top:22%">404.EXE</div>
  <div class="f-ascii" style="left:18%;top:68%">WHERE AM I?</div>
  <div class="f-ascii" style="left:62%;top:74%">NULL_POINTER</div>
  <div class="f-ascii" style="left:44%;top:10%">RECALIBRATING...</div>
  <div class="f-ascii" style="left:82%;top:56%">ERR_MF_LOST</div>
  <div class="f-ascii" style="left:6%;top:44%">SIGNAL_LOST()</div>

  <!-- Main text -->
  <div id="text-404">
    <span class="nc n-4a">4</span><span class="nc n-o">o</span><span class="nc n-h">h</span><span class="nc n-4b">4</span>
  </div>

  <!-- Button -->
  <a id="btn-recalibrate" href="https://marianfusek.com">RECALIBRATE</a>

</div>

<script>
/* ---- CURSOR ---- */
const dot  = document.getElementById("cursor-dot");
const ring = document.getElementById("cursor-ring");
let rx = 0, ry = 0;

document.addEventListener("mousemove", e => {
  dot.style.left  = e.clientX + "px";
  dot.style.top   = e.clientY + "px";
  rx += (e.clientX - rx) * .12;
  ry += (e.clientY - ry) * .12;
  ring.style.left = rx + "px";
  ring.style.top  = ry + "px";
});

(function ringLoop(){
  requestAnimationFrame(ringLoop);
})();

document.querySelectorAll("a, button").forEach(el => {
  el.addEventListener("mouseenter", () => {
    dot.style.width = "10px"; dot.style.height = "10px";
    ring.style.width = "44px"; ring.style.height = "44px";
    ring.style.opacity = ".6";
  });
  el.addEventListener("mouseleave", () => {
    dot.style.width = ""; dot.style.height = "";
    ring.style.width = ""; ring.style.height = "";
    ring.style.opacity = "";
  });
});

/* ---- ASCII cycle ---- */
const ascii = Array.from(document.querySelectorAll(".f-ascii"));
let asciiIndex = 0;
function cycleAscii(){
  ascii.forEach(el => el.classList.remove("show"));
  const current = ascii[asciiIndex % ascii.length];
  current.classList.add("show");
  asciiIndex++;
  setTimeout(() => {
    current.classList.remove("show");
    setTimeout(cycleAscii, 3000);
  }, 1500);
}
setTimeout(cycleAscii, 800);

/* ---- GLITCH / DISMORPH on hover ---- */
const textEl = document.getElementById("text-404");
const chars  = Array.from(textEl.querySelectorAll(".nc"));

let glitchInterval = null;

function startGlitch(){
  if(glitchInterval) return;

  /* RGB split + random char replacement loop */
  const originals = chars.map(c => c.textContent);
  const pool = "!@#$%^&*<>?/\\|{}[]~`0123456789";

  glitchInterval = setInterval(() => {
    chars.forEach((ch, i) => {
      if(Math.random() < .35){
        /* replace with random char */
        ch.textContent = pool[Math.floor(Math.random() * pool.length)];
        const x = (Math.random() * 6 - 3).toFixed(1);
        const nx = (-parseFloat(x) * .7).toFixed(1);
        ch.style.textShadow = `${x}px 0 4px rgba(226,27,22,.85), ${nx}px 0 4px rgba(0,167,255,.85)`;
        ch.style.filter = Math.random() < .4 ? "blur(3px)" : "";

        /* restore after short delay */
        setTimeout(() => {
          ch.textContent = originals[i];
          ch.style.textShadow = "";
          ch.style.filter = "";
        }, 80 + Math.random() * 120);
      }
    });
  }, 60);
}

function stopGlitch(){
  if(glitchInterval){
    clearInterval(glitchInterval);
    glitchInterval = null;
  }
  /* restore */
  chars.forEach(ch => {
    ch.style.textShadow = "";
    ch.style.filter = "";
    ch.style.opacity = "";
  });
  textEl.querySelector(".n-4a").textContent = "4";
  textEl.querySelector(".n-o").textContent  = "o";
  textEl.querySelector(".n-h").textContent  = "h";
  textEl.querySelector(".n-4b").textContent = "4";
}

textEl.addEventListener("mouseenter", startGlitch);
textEl.addEventListener("mouseleave", stopGlitch);

/* ---- Ambient idle dismorph (subtle, every ~8s) ---- */
function idleDismorph(){
  const ch = chars[Math.floor(Math.random() * chars.length)];
  const orig = ch.textContent;
  ch.style.filter = "blur(4px)";
  setTimeout(() => {
    ch.style.filter = "";
    ch.textContent = orig;
    setTimeout(idleDismorph, 5000 + Math.random() * 6000);
  }, 350);
}
setTimeout(idleDismorph, 3000);
</script>

</body>
</html>
